<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário enviado – CTO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .icone { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #1a4fa0; margin-bottom: 10px; }
    .msg { font-size: 15px; color: #444; line-height: 1.6; margin-bottom: 24px; }
    .destaque {
      background: #e8f0fc;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: #1a4fa0;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .aviso {
      font-size: 13px;
      color: #888;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icone">✅</div>
    <h1>Formulário enviado!</h1>
    <p class="msg" id="msg">Obrigado pelas informações. O Dr. Valth já recebeu seu resumo e estará preparado para a consulta.</p>
    <div class="destaque" id="destaque"></div>
    <p class="aviso">Lembre-se de trazer seus exames originais no dia da consulta.</p>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const nome = p.get('nome') || '';
    const data = p.get('data') || '';
    const hora = p.get('hora') || '';

    if (nome) {
      document.getElementById('msg').textContent =
        `Formulário enviado, ${nome.split(' ')[0]}. O Dr. Valth já recebeu seu resumo e estará preparado para a consulta.`;
    }
    if (data && hora) {
      document.getElementById('destaque').textContent =
        `📅 Nos vemos no dia ${data} às ${hora}`;
    } else if (data) {
      document.getElementById('destaque').textContent = `📅 Nos vemos no dia ${data}`;
    } else {
      document.getElementById('destaque').style.display = 'none';
    }
  </script>
</body>
</html>
